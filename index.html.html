<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>รวมคู่มือ Motor Drive Inverter ประเทศไทย</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        header {
            text-align: center;
            color: white;
            padding: 30px 0;
            margin-bottom: 30px;
        }
        
        header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }
        
        header p {
            font-size: 1.1em;
            opacity: 0.9;
        }
        
        .search-box {
            background: white;
            padding: 15px 20px;
            border-radius: 50px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            margin-bottom: 30px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .search-box input {
            flex: 1;
            border: none;
            outline: none;
            font-size: 1.1em;
            padding: 5px;
        }
        
        .search-box .icon {
            font-size: 1.5em;
            color: #667eea;
        }
        
        .brand-filter {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 30px;
            justify-content: center;
        }
        
        .brand-btn {
            background: rgba(255,255,255,0.9);
            border: none;
            padding: 10px 20px;
            border-radius: 25px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
            font-size: 0.9em;
        }
        
        .brand-btn:hover, .brand-btn.active {
            background: #667eea;
            color: white;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }
        
        .brand-header {
            background: white;
            padding: 20px 30px;
            border-radius: 15px 15px 0 0;
            margin-bottom: 2px;
            display: flex;
            align-items: center;
            gap: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        
        .brand-logo {
            width: 50px;
            height: 50px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 1.2em;
            color: white;
        }
        
        .brand-header h2 {
            font-size: 1.8em;
            color: #333;
        }
        
        .models-grid {
            background: white;
            padding: 30px;
            border-radius: 0 0 15px 15px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            margin-bottom: 40px;
        }
        
        .model-card {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 20px;
            transition: all 0.3s;
            border: 2px solid transparent;
        }
        
        .model-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.15);
            border-color: #667eea;
        }
        
        .model-card h3 {
            color: #333;
            margin-bottom: 8px;
            font-size: 1.2em;
        }
        
        .model-card p {
            color: #666;
            font-size: 0.9em;
            margin-bottom: 15px;
        }
        
        .model-card .file-info {
            display: flex;
            align-items: center;
            gap: 5px;
            color: #999;
            font-size: 0.85em;
            margin-bottom: 15px;
        }
        
        .btn-group {
            display: flex;
            gap: 10px;
        }
        
        .btn {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            font-size: 0.85em;
            transition: all 0.3s;
            text-decoration: none;
            text-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
        }
        
        .btn-view {
            background: #667eea;
            color: white;
        }
        
        .btn-view:hover {
            background: #5568d3;
        }
        
        .btn-download {
            background: #48bb78;
            color: white;
        }
        
        .btn-download:hover {
            background: #38a169;
        }
        
        .no-results {
            text-align: center;
            color: white;
            font-size: 1.5em;
            padding: 50px;
            display: none;
        }
        
        .stats {
            text-align: center;
            color: white;
            margin-bottom: 20px;
            font-size: 1.1em;
        }
        
        /* Modal for PDF viewer */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        
        .modal.active {
            display: flex;
        }
        
        .modal-content {
            background: white;
            width: 90%;
            height: 90%;
            border-radius: 15px;
            position: relative;
            overflow: hidden;
        }
        
        .modal-header {
            background: #667eea;
            color: white;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .modal-close {
            background: none;
            border: none;
            color: white;
            font-size: 1.5em;
            cursor: pointer;
        }
        
        .modal-body {
            height: calc(100% - 60px);
            overflow: auto;
            padding: 0;
        }
        
        .modal-body iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
        
        footer {
            text-align: center;
            color: white;
            padding: 30px 0;
            margin-top: 50px;
            opacity: 0.8;
        }
        
        @media (max-width: 768px) {
            header h1 {
                font-size: 1.8em;
            }
            
            .models-grid {
                grid-template-columns: 1fr;
            }
            
            .btn-group {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>⚡ รวมคู่มือ Motor Drive Inverter</h1>
            <p>คู่มือการใช้งาน Inverter ทุกรุ่นที่มีขายในประเทศไทย</p>
        </header>
        
        <div class="search-box">
            <span class="icon">🔍</span>
            <input type="text" id="searchInput" placeholder="ค้นหายี่ห้อหรือรุ่น (เช่น ABB, ACS580, iP5A)">
        </div>
        
        <div class="stats" id="stats">กำลังโหลด...</div>
        
        <div class="brand-filter">
            <button class="brand-btn active" data-brand="all">ทั้งหมด</button>
            <button class="brand-btn" data-brand="abb">ABB</button>
            <button class="brand-btn" data-brand="danfoss">Danfoss</button>
            <button class="brand-btn" data-brand="invt">INVT</button>
            <button class="brand-btn" data-brand="ls">LS</button>
            <button class="brand-btn" data-brand="yaskawa">Yaskawa</button>
            <button class="brand-btn" data-brand="mitsubishi">Mitsubishi</button>
            <button class="brand-btn" data-brand="fuji">Fuji Electric</button>
            <button class="brand-btn" data-brand="schneider">Schneider</button>
            <button class="brand-btn" data-brand="delta">Delta</button>
            <button class="brand-btn" data-brand="siemens">Siemens</button>
        </div>
        
        <div id="brandsContainer"></div>
        
        <div class="no-results" id="noResults">ไม่พบผลลัพธ์ที่ค้นหา 😔</div>
        
        <footer>
            <p>© 2026 Motor Drive Inverter Manual Hub | รวมคู่มือ Inverter ประเทศไทย</p>
        </footer>
    </div>
    
    <!-- PDF Viewer Modal -->
    <div class="modal" id="pdfModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modalTitle">คู่มือ</h3>
                <button class="modal-close" onclick="closeModal()">✕</button>
            </div>
            <div class="modal-body" id="modalBody">
                <!-- PDF จะถูกแสดงที่นี่ -->
            </div>
        </div>
    </div>
    
    <script>
        // ฐานข้อมูล Inverter - แก้ไขเพิ่มรุ่นได้ตามต้องการ
        const inverterData = [
            {
                brand: 'abb',
                brandName: 'ABB',
                color: '#FF0000',
                models: [
                    { name: 'ACS580', desc: 'General purpose drive, 0.75-500 kW', size: '15.2 MB', pdf: 'abb-acs580.pdf' },
                    { name: 'ACS880', desc: 'Industrial drive, single drive', size: '22.8 MB', pdf: 'abb-acs880.pdf' },
                    { name: 'ACS380', desc: 'Machinery drive', size: '12.5 MB', pdf: 'abb-acs380.pdf' },
                    { name: 'ACS180', desc: 'Compact machinery drive', size: '8.3 MB', pdf: 'abb-acs180.pdf' },
                    { name: 'ACH580', desc: 'HVAC drive', size: '14.7 MB', pdf: 'abb-ach580.pdf' }
                ]
            },
            {
                brand: 'danfoss',
                brandName: 'Danfoss',
                color: '#E31E24',
                models: [
                    { name: 'VLT AutomationDrive FC 302', desc: 'High performance drive', size: '18.4 MB', pdf: 'danfoss-fc302.pdf' },
                    { name: 'VLT HVAC Drive FC 102', desc: 'HVAC applications', size: '16.2 MB', pdf: 'danfoss-fc102.pdf' },
                    { name: 'VLT Aqua Drive FC 202', desc: 'Water/wastewater drive', size: '14.8 MB', pdf: 'danfoss-fc202.pdf' },
                    { name: 'VLT Micro Drive FC 51', desc: 'Compact drive', size: '6.5 MB', pdf: 'danfoss-fc51.pdf' }
                ]
            },
            {
                brand: 'invt',
                brandName: 'INVT',
                color: '#0066CC',
                models: [
                    { name: 'GD200A', desc: 'General purpose vector control', size: '12.3 MB', pdf: 'invt-gd200a.pdf' },
                    { name: 'GD350', desc: 'High performance inverter', size: '18.6 MB', pdf: 'invt-gd350.pdf' },
                    { name: 'GD20', desc: 'Compact general purpose', size: '8.9 MB', pdf: 'invt-gd20.pdf' },
                    { name: 'GD10', desc: 'Mini vector inverter', size: '5.2 MB', pdf: 'invt-gd10.pdf' },
                    { name: 'CHF100A', desc: 'Vector control inverter', size: '10.4 MB', pdf: 'invt-chf100a.pdf' }
                ]
            },
            {
                brand: 'ls',
                brandName: 'LS Electric',
                color: '#003DA5',
                models: [
                    { name: 'iP5A', desc: 'High performance vector control', size: '14.2 MB', pdf: 'ls-ip5a.pdf' },
                    { name: 'iC5', desc: 'Compact general purpose', size: '9.8 MB', pdf: 'ls-ic5.pdf' },
                    { name: 'iG5A', desc: 'General purpose drive', size: '11.5 MB', pdf: 'ls-ig5a.pdf' },
                    { name: 'iV5', desc: 'High performance inverter', size: '16.7 MB', pdf: 'ls-iv5.pdf' },
                    { name: 'iS7', desc: 'High performance vector control', size: '19.3 MB', pdf: 'ls-is7.pdf' }
                ]
            },
            {
                brand: 'yaskawa',
                brandName: 'Yaskawa',
                color: '#E60012',
                models: [
                    { name: 'GA700', desc: 'Industrial drive', size: '20.1 MB', pdf: 'yaskawa-ga700.pdf' },
                    { name: 'GA500', desc: 'General purpose drive', size: '17.5 MB', pdf: 'yaskawa-ga500.pdf' },
                    { name: 'V1000', desc: 'Compact drive', size: '8.4 MB', pdf: 'yaskawa-v1000.pdf' },
                    { name: 'A1000', desc: 'High performance drive', size: '22.6 MB', pdf: 'yaskawa-a1000.pdf' }
                ]
            },
            {
                brand: 'mitsubishi',
                brandName: 'Mitsubishi',
                color: '#E60012',
                models: [
                    { name: 'FR-A800', desc: 'High performance inverter', size: '21.3 MB', pdf: 'mitsubishi-fra800.pdf' },
                    { name: 'FR-E800', desc: 'Compact high performance', size: '15.8 MB', pdf: 'mitsubishi-fre800.pdf' },
                    { name: 'FR-D700', desc: 'General purpose inverter', size: '12.4 MB', pdf: 'mitsubishi-frd700.pdf' }
                ]
            },
            {
                brand: 'fuji',
                brandName: 'Fuji Electric',
                color: '#0066CC',
                models: [
                    { name: 'FRENIC-Ace', desc: 'Multi-functional inverter', size: '18.9 MB', pdf: 'fuji-frenic-ace.pdf' },
                    { name: 'FRENIC-Mini', desc: 'Compact inverter', size: '10.2 MB', pdf: 'fuji-frenic-mini.pdf' },
                    { name: 'FRENIC-Eco', desc: 'Fan/pump drive', size: '14.5 MB', pdf: 'fuji-frenic-eco.pdf' }
                ]
            },
            {
                brand: 'schneider',
                brandName: 'Schneider Electric',
                color: '#3DCD58',
                models: [
                    { name: 'Altivar Process ATV930', desc: 'High performance drive', size: '23.4 MB', pdf: 'schneider-atv930.pdf' },
                    { name: 'Altivar Machine ATV320', desc: 'Machine drive', size: '16.8 MB', pdf: 'schneider-atv320.pdf' },
                    { name: 'Altivar ATV12', desc: 'Compact drive', size: '7.9 MB', pdf: 'schneider-atv12.pdf' }
                ]
            },
            {
                brand: 'delta',
                brandName: 'Delta',
                color: '#003DA5',
                models: [
                    { name: 'C2000 Plus', desc: 'High performance vector drive', size: '19.2 MB', pdf: 'delta-c2000.pdf' },
                    { name: 'MS300', desc: 'Compact high performance', size: '13.6 MB', pdf: 'delta-ms300.pdf' },
                    { name: 'VFD-E', desc: 'General purpose drive', size: '10.8 MB', pdf: 'delta-vfd-e.pdf' }
                ]
            },
            {
                brand: 'siemens',
                brandName: 'Siemens',
                color: '#009999',
                models: [
                    { name: 'SINAMICS G120', desc: 'Modular drive system', size: '24.5 MB', pdf: 'siemens-g120.pdf' },
                    { name: 'SINAMICS V20', desc: 'Basic inverter', size: '11.2 MB', pdf: 'siemens-v20.pdf' },
                    { name: 'SINAMICS S120', desc: 'High performance drive', size: '28.7 MB', pdf: 'siemens-s120.pdf' }
                ]
            }
        ];
        
        function renderBrands(filter = 'all', searchTerm = '') {
            const container = document.getElementById('brandsContainer');
            const noResults = document.getElementById('noResults');
            container.innerHTML = '';
            
            let totalModels = 0;
            let totalBrands = 0;
            let hasResults = false;
            
            const filteredData = inverterData.filter(brand => {
                if (filter !== 'all' && brand.brand !== filter) return false;
                return true;
            });
            
            filteredData.forEach(brand => {
                const filteredModels = brand.models.filter(model => {
                    if (!searchTerm) return true;
                    const term = searchTerm.toLowerCase();
                    return brand.brandName.toLowerCase().includes(term) ||
                           model.name.toLowerCase().includes(term) ||
                           model.desc.toLowerCase().includes(term);
                });
                
                if (filteredModels.length === 0) return;
                
                hasResults = true;
                totalModels += filteredModels.length;
                totalBrands++;
                
                const section = document.createElement('div');
                
                section.innerHTML = `
                    <div class="brand-header">
                        <div class="brand-logo" style="background: ${brand.color}">${brand.brandName.substring(0, 2)}</div>
                        <h2>${brand.brandName}</h2>
                        <span style="color: #666; margin-left: auto;">${filteredModels.length} รุ่น</span>
                    </div>
                    <div class="models-grid">
                        ${filteredModels.map(model => `
                            <div class="model-card">
                                <h3>${model.name}</h3>
                                <p>${model.desc}</p>
                                <div class="file-info">
                                    <span>📎 PDF</span>
                                    <span>${model.size}</span>
                                </div>
                                <div class="btn-group">
                                    <button class="btn btn-view" onclick="viewPDF('${brand.brandName} ${model.name}', '${model.pdf}')">
                                        👁️ ดู
                                    </button>
                                    <button class="btn btn-download" onclick="downloadPDF('${model.pdf}', '${brand.brandName}_${model.name}')">
                                        ⬇️ ดาวน์โหลด
                                    </button>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                `;
                
                container.appendChild(section);
            });
            
            document.getElementById('stats').textContent = 
                `📊 แสดง ${totalModels} รุ่น จาก ${totalBrands} ยี่ห้อ`;
            
            noResults.style.display = hasResults ? 'none' : 'block';
        }
        
        function viewPDF(title, filename) {
            document.getElementById('modalTitle').textContent = title;
            document.getElementById('modalBody').innerHTML = 
                `<iframe src="manuals/${filename}" title="${title}"></iframe>`;
            document.getElementById('pdfModal').classList.add('active');
        }
        
        function closeModal() {
            document.getElementById('pdfModal').classList.remove('active');
            document.getElementById('modalBody').innerHTML = '';
        }
        
        function downloadPDF(filename, name) {
            const link = document.createElement('a');
            link.href = `manuals/${filename}`;
            link.download = filename;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }
        
        // Event listeners
        document.querySelectorAll('.brand-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                document.querySelectorAll('.brand-btn').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                renderBrands(this.dataset.brand, document.getElementById('searchInput').value);
            });
        });
        
        document.getElementById('searchInput').addEventListener('input', function() {
            const activeBrand = document.querySelector('.brand-btn.active').dataset.brand;
            renderBrands(activeBrand, this.value);
        });
        
        document.getElementById('pdfModal').addEventListener('click', function(e) {
            if (e.target === this) closeModal();
        });
        
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') closeModal();
        });
        
        // Initial render
        renderBrands();
    </script>
</body>
</html>
